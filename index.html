<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <meta property="og:title" content="Anmita Riga 宇宙訊號">

  <meta property="og:type" content="website">

  <meta property="og:locale" content="zh_TW">

  <meta name="twitter:title" content="Anmita Riga 宇宙訊號">
  <meta name="twitter:description" content="透過色彩、脈輪和物件，發現內在的靜謐角落">
  <meta name="theme-color" content="#1B1825">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    /* ════════════════════════════════════════
       Design Tokens — Cosmic Healing
    ════════════════════════════════════════ */
    :root {
      /* 宇宙底色 — 暮光星雲，明亮版 */
      --ink-deepest: #5A5078;
      --ink-deep:    #6A608A;
      --ink-mid:     #7A709A;
      --ink-soft:    #8A80AA;

      /* 文字層級 */
      --text-primary:   #FDFAF8;
      --text-secondary: #EDE5F0;
      --text-muted:     #C8BDD5;
      --text-whisper:   #A098B0;

      /* 香檳金 — 星光點綴 */
      --gold:        #E8C97A;
      --gold-soft:   #F0D898;
      --gold-faint:  rgba(232, 201, 122, 0.28);
      --gold-line:   rgba(232, 201, 122, 0.65);

      /* 薰衣草紫 — 覺察能量 */
      --lavender:        #C4AADF;
      --lavender-soft:   #D4C0EC;
      --lavender-deep:   #9B82C4;
      --lavender-glow:   rgba(196, 170, 223, 0.30);
      --lavender-faint:  rgba(196, 170, 223, 0.14);

      /* 石英藍 — 靜觀空間 */
      --quartz:        #8EC4D8;
      --quartz-soft:   #A8D4E4;
      --quartz-deep:   #6AAEC6;
      --quartz-glow:   rgba(142, 196, 216, 0.30);
      --quartz-faint:  rgba(142, 196, 216, 0.14);

      /* 排版尺度 */
      --tracking-loose:  0.32em;
      --tracking-mid:    0.18em;
      --tracking-tight:  0.06em;

      /* 動畫曲線 */
      --ease-silk: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { background: var(--ink-deepest); }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 90% 50% at 50% 0%,   rgba(220, 200, 245, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 15% 40%,  rgba(232, 201, 122, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 85% 60%,  rgba(210, 185, 240, 0.28) 0%, transparent 55%),
        radial-gradient(ellipse 80% 45% at 50% 100%, rgba(232, 201, 122, 0.25) 0%, transparent 60%),
        linear-gradient(180deg, var(--ink-deep) 0%, var(--ink-deepest) 50%, var(--ink-deep) 100%);
      font-family: "Noto Serif TC", "Cormorant Garamond", Georgia, serif;
      font-weight: 300;
      color: var(--text-secondary);
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 星塵粒子 — 薰衣草金混合 ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at  8% 14%, rgba(232, 201, 122, 0.70), transparent),
        radial-gradient(1px   1px   at 25% 28%, rgba(196, 170, 223, 0.55), transparent),
        radial-gradient(1.5px 1.5px at 72% 18%, rgba(232, 201, 122, 0.60), transparent),
        radial-gradient(1px   1px   at 90% 42%, rgba(196, 170, 223, 0.50), transparent),
        radial-gradient(1px   1px   at 38% 65%, rgba(232, 201, 122, 0.45), transparent),
        radial-gradient(1.5px 1.5px at 55% 82%, rgba(196, 170, 223, 0.60), transparent),
        radial-gradient(1px   1px   at 18% 78%, rgba(232, 201, 122, 0.40), transparent),
        radial-gradient(1px   1px   at 82% 90%, rgba(196, 170, 223, 0.45), transparent),
        radial-gradient(1.5px 1.5px at 48%  6%, rgba(245, 235, 210, 0.65), transparent),
        radial-gradient(1px   1px   at 65% 55%, rgba(212, 192, 236, 0.45), transparent);
      pointer-events: none;
      z-index: 0;
      animation: starBreath 20s ease-in-out infinite;
    }

    @keyframes starBreath {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    /* ── 極光漂浮 — 薰衣草 × 金 ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 500px 320px at 20% 25%, rgba(210, 185, 240, 0.32) 0%, transparent 65%),
        radial-gradient(ellipse 420px 280px at 82% 68%, rgba(232, 201, 122, 0.28) 0%, transparent 65%),
        radial-gradient(ellipse 380px 260px at 60% 20%, rgba(180, 155, 220, 0.22) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: auroraFlow 32s ease-in-out infinite alternate;
    }

    @keyframes auroraFlow {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.7; }
      50%  { opacity: 1; }
      100% { transform: translate(-25px, 18px) scale(1.04); opacity: 0.8; }
    }

    /* ════════════════════════════════════════
       Layout
    ════════════════════════════════════════ */
    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5.5rem 1.8rem 4rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ════════════════════════════════════════
       Hero — 品牌標題
    ════════════════════════════════════════ */
    .brand-mark {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: silkFadeIn 1.6s var(--ease-silk) 0.2s forwards;
    }

    .brand-line {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender));
    }
    .brand-line.right {
      background: linear-gradient(90deg, var(--lavender), transparent);
    }

    .brand-glyph {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.74rem;
      letter-spacing: var(--tracking-loose);
      color: var(--lavender-soft);
      text-transform: uppercase;
      font-weight: 400;
    }

    .hero {
      text-align: center;
      margin-bottom: 4.5rem;
      opacity: 0;
      animation: silkFadeIn 1.6s var(--ease-silk) 0.5s forwards;
    }

    .hero-title {
      font-family: "Cormorant Garamond", "Noto Serif TC", serif;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 1.4rem;
    }

    .hero-divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.4rem;
      position: relative;
    }
    .hero-divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 5px; height: 5px;
      background: var(--gold);
    }

    .hero-sub {
      font-size: 0.72rem;
      letter-spacing: var(--tracking-loose);
      color: var(--lavender);
      line-height: 1.8;
      font-weight: 300;
    }

    /* ════════════════════════════════════════
       Entries — 三個入口
    ════════════════════════════════════════ */
    .entries {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      width: 100%;
      max-width: 360px;
    }

    .btn-entry {
      position: relative;
      display: block;
      text-decoration: none;
      padding: 2rem 1.8rem 2rem 2.4rem;
      background: linear-gradient(180deg,
        rgba(38, 32, 58, 0.88) 0%,
        rgba(38, 32, 58, 0.75) 100%);
      border: 1px solid rgba(220, 200, 245, 0.18);
      box-shadow:
        0 8px 32px rgba(20, 16, 38, 0.55),
        0 2px 8px rgba(20, 16, 38, 0.35);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.7s var(--ease-silk);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(20px);
      animation: silkRise 1.2s var(--ease-silk) forwards;
    }

    /* ── 三張各自的色彩個性 ── */
    .blessing {
      background: linear-gradient(180deg,
        rgba(38, 32, 58, 0.88) 0%,
        rgba(232, 201, 122, 0.09) 100%);
      box-shadow:
        inset 3px 0 0 0 var(--gold),
        0 8px 32px rgba(20, 16, 38, 0.55),
        0 2px 8px rgba(20, 16, 38, 0.35);
    }
    .chakra {
      background: linear-gradient(180deg,
        rgba(38, 32, 58, 0.88) 0%,
        rgba(196, 170, 223, 0.10) 100%);
      box-shadow:
        inset 3px 0 0 0 var(--lavender),
        0 8px 32px rgba(20, 16, 38, 0.55),
        0 2px 8px rgba(20, 16, 38, 0.35);
    }
    .room {
      background: linear-gradient(180deg,
        rgba(38, 32, 58, 0.88) 0%,
        rgba(142, 196, 216, 0.10) 100%);
      box-shadow:
        inset 3px 0 0 0 var(--quartz),
        0 8px 32px rgba(20, 16, 38, 0.55),
        0 2px 8px rgba(20, 16, 38, 0.35);
    }

    /* ── 各自眉題顏色 ── */
    .blessing .btn-eyebrow { color: var(--gold); }
    .chakra   .btn-eyebrow { color: var(--lavender); }
    .room     .btn-eyebrow { color: var(--quartz); }

    /* ── 各自 hover 光暈 ── */
    .blessing:hover {
      border-color: rgba(232, 201, 122, 0.50);
      box-shadow:
        inset 3px 0 0 0 var(--gold-soft),
        0 24px 64px rgba(16, 12, 32, 0.60),
        0 0 48px rgba(232, 201, 122, 0.22),
        0 0 0 1px rgba(232, 201, 122, 0.25);
    }
    .chakra:hover {
      border-color: rgba(196, 170, 223, 0.50);
      box-shadow:
        inset 3px 0 0 0 var(--lavender-soft),
        0 24px 64px rgba(16, 12, 32, 0.60),
        0 0 48px rgba(196, 170, 223, 0.25),
        0 0 0 1px rgba(196, 170, 223, 0.25);
    }
    .room:hover {
      border-color: rgba(142, 196, 216, 0.50);
      box-shadow:
        inset 3px 0 0 0 var(--quartz-soft),
        0 24px 64px rgba(16, 12, 32, 0.60),
        0 0 48px rgba(142, 196, 216, 0.22),
        0 0 0 1px rgba(142, 196, 216, 0.25);
    }

    .btn-entry:nth-child(1) { animation-delay: 0.9s; }
    .btn-entry:nth-child(2) { animation-delay: 1.1s; }
    .btn-entry:nth-child(3) { animation-delay: 1.3s; }

    /* 卡片頂部細線 — 各自顏色 */
    .btn-entry::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 1px;
      opacity: 0;
      transition: opacity 0.8s var(--ease-silk);
    }
    .blessing::before {
      background: linear-gradient(90deg,
        transparent 0%, var(--gold-soft) 30%, var(--gold) 50%, var(--gold-soft) 70%, transparent 100%);
    }
    .chakra::before {
      background: linear-gradient(90deg,
        transparent 0%, var(--lavender) 30%, var(--lavender-soft) 50%, var(--lavender) 70%, transparent 100%);
    }
    .room::before {
      background: linear-gradient(90deg,
        transparent 0%, var(--quartz) 30%, var(--quartz-soft) 50%, var(--quartz) 70%, transparent 100%);
    }

    /* 卡片內光暈 — 各自顏色 */
    .btn-entry::after {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.8s var(--ease-silk);
      pointer-events: none;
    }
    .blessing::after {
      background: radial-gradient(ellipse 180% 55% at 50% 0%,
        rgba(232, 201, 122, 0.16) 0%, transparent 60%);
    }
    .chakra::after {
      background: radial-gradient(ellipse 180% 55% at 50% 0%,
        rgba(196, 170, 223, 0.16) 0%, transparent 60%);
    }
    .room::after {
      background: radial-gradient(ellipse 180% 55% at 50% 0%,
        rgba(142, 196, 216, 0.16) 0%, transparent 60%);
    }

    .btn-entry:hover {
      transform: translateY(-4px);
    }

    .btn-entry:hover::before { opacity: 1; }
    .btn-entry:hover::after  { opacity: 1; }

    .btn-entry:active {
      transform: translateY(-1px) scale(0.995);
      transition-duration: 0.15s;
    }

    /* ── 卡片內排版 ── */
    .btn-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 1.6rem;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn-eyebrow {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.68rem;
      letter-spacing: var(--tracking-loose);
      color: var(--lavender);
      text-transform: uppercase;
      opacity: 0.9;
      font-weight: 400;
    }

    .btn-label {
      font-size: 1.18rem;
      font-weight: 400;
      letter-spacing: var(--tracking-mid);
      color: var(--text-primary);
      line-height: 1.3;
    }

    .btn-desc {
      font-size: 0.74rem;
      letter-spacing: var(--tracking-tight);
      line-height: 1.85;
      color: var(--text-muted);
      font-weight: 300;
      margin-top: 0.25rem;
    }

    /* 右側箭頭 */
    .btn-arrow {
      width: 28px; height: 1px;
      position: relative;
      transition: all 0.6s var(--ease-silk);
      align-self: center;
      flex-shrink: 0;
    }
    .btn-arrow::after {
      content: '';
      position: absolute;
      right: 0; top: -3px;
      width: 7px; height: 7px;
      transform: rotate(45deg);
      transition: all 0.6s var(--ease-silk);
    }

    .blessing .btn-arrow            { background: rgba(232, 201, 122, 0.55); }
    .blessing .btn-arrow::after     { border-top: 1px solid rgba(232, 201, 122, 0.55); border-right: 1px solid rgba(232, 201, 122, 0.55); }
    .blessing:hover .btn-arrow      { width: 42px; background: var(--gold); }
    .blessing:hover .btn-arrow::after { border-color: var(--gold); }

    .chakra .btn-arrow              { background: rgba(196, 170, 223, 0.55); }
    .chakra .btn-arrow::after       { border-top: 1px solid rgba(196, 170, 223, 0.55); border-right: 1px solid rgba(196, 170, 223, 0.55); }
    .chakra:hover .btn-arrow        { width: 42px; background: var(--lavender); }
    .chakra:hover .btn-arrow::after { border-color: var(--lavender); }

    .room .btn-arrow                { background: rgba(142, 196, 216, 0.55); }
    .room .btn-arrow::after         { border-top: 1px solid rgba(142, 196, 216, 0.55); border-right: 1px solid rgba(142, 196, 216, 0.55); }
    .room:hover .btn-arrow          { width: 42px; background: var(--quartz); }
    .room:hover .btn-arrow::after   { border-color: var(--quartz); }

    /* ════════════════════════════════════════
       Footer
    ════════════════════════════════════════ */
    .footer-note {
      margin-top: 4.5rem;
      text-align: center;
      opacity: 0;
      animation: silkFadeIn 1.6s var(--ease-silk) 1.6s forwards;
    }

    .footer-divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.6rem;
      position: relative;
    }
    .footer-divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 6px; height: 6px;
      border: 1px solid var(--gold);
    }

    .footer-text {
      font-family: "Cormorant Garamond", "Noto Serif TC", serif;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      color: var(--text-secondary);
      line-height: 2.2;
      font-weight: 400;
      font-style: italic;
    }

    .footer-signature {
      margin-top: 1.2rem;
      font-size: 0.62rem;
      letter-spacing: var(--tracking-loose);
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ════════════════════════════════════════
       Animations
    ════════════════════════════════════════ */
    @keyframes silkFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes silkRise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-out { animation: fadeOut 0.6s var(--ease-silk) forwards; }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: scale(0.98); }
    }

    /* ════════════════════════════════════════
       Responsive
    ════════════════════════════════════════ */
    @media (max-width: 480px) {
      .content { padding: 4.5rem 1.5rem 3rem; }
      .brand-mark { margin-bottom: 3rem; }
      .hero { margin-bottom: 3.8rem; }
      .hero-title { font-size: 2rem; letter-spacing: 0.14em; }
      .entries { gap: 1.2rem; }
      .btn-entry { padding: 1.7rem 1.5rem 1.7rem 1.8rem; }
      .btn-inner { gap: 1.2rem; }
      .btn-label { font-size: 1.08rem; }
      .btn-desc { font-size: 0.72rem; }
      .btn-arrow { width: 22px; }
      .btn-entry:hover .btn-arrow { width: 30px; }
      .footer-note { margin-top: 3.5rem; }
    }

    @media (max-width: 360px) {
      .btn-arrow, .btn-entry:hover .btn-arrow { display: none; }
      .btn-inner { grid-template-columns: 1fr; }
    }

    /* Accessibility — Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.1s !important;
      }
    }
  </style>
</head>
<body>

  <div class="content">

    <!-- 品牌 mark -->
    <div class="brand-mark">
      <span class="brand-line"></span>
      <span class="brand-glyph">Est · 宇宙訊號</span>
      <span class="brand-line right"></span>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-title">Anmita Riga</div>
      <div class="hero-divider"></div>
      <div class="hero-sub">透 過 色 彩 · 聆 聽 此 刻</div>
    </div>

    <!-- 三入口 -->
    <div class="entries">

      <a class="btn-entry blessing" href="daily-color.html">
        <div class="btn-inner">
          <div class="btn-text">
            <div class="btn-eyebrow">Daily Blessing</div>
            <div class="btn-label">接收祝福</div>
            <div class="btn-desc">今日的色彩訊息，給你一個靜觀的起點</div>
          </div>
          <div class="btn-arrow"></div>
        </div>
      </a>

      <a class="btn-entry chakra" href="chakra-cat.html">
        <div class="btn-inner">
          <div class="btn-text">
            <div class="btn-eyebrow">Energy Awareness</div>
            <div class="btn-label">覺察能量</div>
            <div class="btn-desc">感受七個能量中心，聆聽身體此刻的聲音</div>
          </div>
          <div class="btn-arrow"></div>
        </div>
      </a>

      <a class="btn-entry room" href="cat-room.html">
        <div class="btn-inner">
          <div class="btn-text">
            <div class="btn-eyebrow">Quiet Sanctuary</div>
            <div class="btn-label">靜觀空間</div>
            <div class="btn-desc">透過色彩與物件的組合，發現內在的靜謐角落</div>
          </div>
          <div class="btn-arrow"></div>
        </div>
      </a>

    </div>

    <!-- Footer -->
    <div class="footer-note">
      <div class="footer-divider"></div>
      <div class="footer-text">每一刻 · 都是一個重新開始的機會</div>
      <div class="footer-signature">Anmita Riga &nbsp;·&nbsp; MMXXVI</div>
    </div>

  </div>

<script>
  // ── PWA Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── LIFF 初始化 ──
  initLiff();

  // ── 點擊淡出轉場 ──
  document.querySelectorAll('.btn-entry').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = href; }, 580);
    });
  });
</script>
</body>
</html>
