  <style>
    /* ════════════════════════════════════════
       Design Tokens — Cosmic Healing
    ════════════════════════════════════════ */
    :root {
      /* 宇宙底色 — 暮光星雲，明亮版 */
      --ink-deepest: #5A5078;
      --ink-deep:    #6A608A;
      --ink-mid:     #7A709A;
      --ink-soft:    #8A80AA;

      /* 文字層級 */
      --text-primary:   #FDFAF8;
      --text-secondary: #EDE5F0;
      --text-muted:     #C8BDD5;
      --text-whisper:   #A098B0;

      /* 香檳金 — 星光點綴 */
      --gold:        #E8C97A;
      --gold-soft:   #F0D898;
      --gold-faint:  rgba(232, 201, 122, 0.28);
      --gold-line:   rgba(232, 201, 122, 0.65);

      /* 薰衣草紫 — 覺察能量 */
      --lavender:        #C4AADF;
      --lavender-soft:   #D4C0EC;
      --lavender-deep:   #9B82C4;
      --lavender-glow:   rgba(196, 170, 223, 0.30);
      --lavender-faint:  rgba(196, 170, 223, 0.14);

      /* 石英藍 — 靜觀空間 */
      --quartz:        #8EC4D8;
      --quartz-soft:   #A8D4E4;
      --quartz-deep:   #6AAEC6;
      --quartz-glow:   rgba(142, 196, 216, 0.30);
      --quartz-faint:  rgba(142, 196, 216, 0.14);

      /* 排版尺度 */
      --tracking-loose:  0.32em;
      --tracking-mid:    0.18em;
      --tracking-tight:  0.06em;

      /* 動畫曲線 */
      --ease-silk: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { background: var(--ink-deepest); }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 90% 50% at 50% 0%,   rgba(220, 200, 245, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 15% 40%,  rgba(232, 201, 122, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 85% 60%,  rgba(210, 185, 240, 0.28) 0%, transparent 55%),
        radial-gradient(ellipse 80% 45% at 50% 100%, rgba(232, 201, 122, 0.25) 0%, transparent 60%),
        linear-gradient(180deg, var(--ink-deep) 0%, var(--ink-deepest) 50%, var(--ink-deep) 100%);
      font-family: "Noto Serif TC", "Cormorant Garamond", Georgia, serif;
      font-weight: 300;
      color: var(--text-secondary);
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 星塵粒子 — 薰衣草金混合 ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at  8% 14%, rgba(232, 201, 122, 0.70), transparent),
        radial-gradient(1px   1px   at 25% 28%, rgba(196, 170, 223, 0.55), transparent),
        radial-gradient(1.5px 1.5px at 72% 18%, rgba(232, 201, 122, 0.60), transparent),
        radial-gradient(1px   1px   at 90% 42%, rgba(196, 170, 223, 0.50), transparent),
        radial-gradient(1px   1px   at 38% 65%, rgba(232, 201, 122, 0.45), transparent),
        radial-gradient(1.5px 1.5px at 55% 82%, rgba(196, 170, 223, 0.60), transparent),
        radial-gradient(1px   1px   at 18% 78%, rgba(232, 201, 122, 0.40), transparent),
        radial-gradient(1px   1px   at 82% 90%, rgba(196, 170, 223, 0.45), transparent),
        radial-gradient(1.5px 1.5px at 48%  6%, rgba(245, 235, 210, 0.65), transparent),
        radial-gradient(1px   1px   at 65% 55%, rgba(212, 192, 236, 0.45), transparent);
      pointer-events: none;
      z-index: 0;
      animation: starBreath 20s ease-in-out infinite;
    }

    @keyframes starBreath {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    /* ── 極光漂浮 — 薰衣草 × 金 ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 500px 320px at 20% 25%, rgba(210, 185, 240, 0.32) 0%, transparent 65%),
        radial-gradient(ellipse 420px 280px at 82% 68%, rgba(232, 201, 122, 0.28) 0%, transparent 65%),
        radial-gradient(ellipse 380px 260px at 60% 20%, rgba(180, 155, 220, 0.22) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: auroraFlow 32s ease-in-out infinite alternate;
    }

    @keyframes auroraFlow {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.7; }
      50%  { opacity: 1; }
      100% { transform: translate(-25px, 18px) scale(1.04); opacity: 0.8; }
    }

    /* ════════════════════════════════════════
       Layout
    ════════════════════════════════════════ */
    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5.5rem 1.8rem 4rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ════════════════════════════════════════
       Hero — 品牌標題
    ════════════════════════════════════════ */
    .brand-mark {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: silkFadeIn 1.6s var(--ease-silk) 0.2s forwards;
    }

    .brand-line {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender));
    }
    .brand-line.right {
      background: linear-gradient(90deg, var(--lavender), transparent);
    }

    .brand-glyph {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.74rem;
      letter-spacing: var(--tracking-loose);
      color: var(--lavender-soft);
      text-transform: uppercase;
      font-weight: 400;
    }

    .hero {
      text-align: center;
      margin-bottom: 4.5rem;
      opacity: 0;
      animation: silkFadeIn 1.6s var(--ease-silk) 0.5s forwards;
    }

    .hero-title {
      font-family: "Cormorant Garamond", "Noto Serif TC", serif;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 1.4rem;
    }

    .hero-divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.4rem;
      position: relative;
    }
    .hero-divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 5px; height: 5px;
      background: var(--gold);
    }

    .hero-sub {
      font-size: 0.72rem;
      letter-spacing: var(--tracking-loose);
      color: var(--lavender);
      line-height: 1.8;
      font-weight: 300;
    }

    /* ════════════════════════════════════════
       Tickets — 不規則票卷入口
    ════════════════════════════════════════ */
    .tickets {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      width: 100%;
      max-width: 360px;
    }

    .ticket-entry {
      position: relative;
      display: block;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      transform: translateY(22px);
      animation: silkRise 1.2s var(--ease-silk) forwards;
      transition: transform 0.45s var(--ease-silk);
    }

    .ticket-entry:nth-child(1) { animation-delay: 0.9s; }
    .ticket-entry:nth-child(2) { animation-delay: 1.1s; }
    .ticket-entry:nth-child(3) { animation-delay: 1.3s; }

    .ticket-entry:hover  { transform: translateY(-5px); }
    .ticket-entry:active { transform: translateY(-1px); transition-duration: 0.12s; }

    .ticket-svg {
      display: block;
      width: 100%;
      overflow: visible;
      transition: filter 0.5s var(--ease-silk);
    }

    .t-gold   .ticket-svg { filter: drop-shadow(0 8px 20px rgba(16,12,36,0.60)); }
    .t-lav    .ticket-svg { filter: drop-shadow(0 8px 20px rgba(16,12,36,0.60)); }
    .t-quartz .ticket-svg { filter: drop-shadow(0 8px 20px rgba(16,12,36,0.60)); }

    .t-gold:hover   .ticket-svg { filter: drop-shadow(0 16px 36px rgba(16,12,36,0.65)) drop-shadow(0 0 28px rgba(232,201,122,0.28)); }
    .t-lav:hover    .ticket-svg { filter: drop-shadow(0 16px 36px rgba(16,12,36,0.65)) drop-shadow(0 0 28px rgba(196,170,223,0.28)); }
    .t-quartz:hover .ticket-svg { filter: drop-shadow(0 16px 36px rgba(16,12,36,0.65)) drop-shadow(0 0 28px rgba(142,196,216,0.28)); }

    /* 票卷內容疊加在 SVG 上 */
    .ticket-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 1.8rem 0 2.6rem;
      gap: 1.2rem;
    }

    .ticket-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .tk-eyebrow {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.65rem;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      font-weight: 400;
      opacity: 0.88;
    }

    .tk-label {
      font-size: 1.16rem;
      font-weight: 400;
      letter-spacing: var(--tracking-mid);
      color: var(--text-primary);
      line-height: 1.3;
    }

    .tk-desc {
      font-size: 0.72rem;
      letter-spacing: var(--tracking-tight);
      line-height: 1.85;
      color: var(--text-muted);
      font-weight: 300;
      margin-top: 0.15rem;
    }

    .t-gold   .tk-eyebrow { color: var(--gold); }
    .t-lav    .tk-eyebrow { color: var(--lavender); }
    .t-quartz .tk-eyebrow { color: var(--quartz); }

    /* 右側箭頭 */
    .tk-arrow {
      width: 24px; height: 1px;
      position: relative;
      flex-shrink: 0;
      transition: width 0.5s var(--ease-silk), background 0.5s var(--ease-silk);
    }
    .tk-arrow::after {
      content: '';
      position: absolute;
      right: 0; top: -3px;
      width: 7px; height: 7px;
      transform: rotate(45deg);
      transition: border-color 0.5s var(--ease-silk);
    }

    .t-gold   .tk-arrow          { background: rgba(232,201,122,0.50); }
    .t-gold   .tk-arrow::after   { border-top: 1px solid rgba(232,201,122,0.50); border-right: 1px solid rgba(232,201,122,0.50); }
    .t-gold:hover   .tk-arrow    { width: 38px; background: var(--gold); }
    .t-gold:hover   .tk-arrow::after { border-color: var(--gold); }

    .t-lav    .tk-arrow          { background: rgba(196,170,223,0.50); }
    .t-lav    .tk-arrow::after   { border-top: 1px solid rgba(196,170,223,0.50); border-right: 1px solid rgba(196,170,223,0.50); }
    .t-lav:hover    .tk-arrow    { width: 38px; background: var(--lavender); }
    .t-lav:hover    .tk-arrow::after { border-color: var(--lavender); }

    .t-quartz .tk-arrow          { background: rgba(142,196,216,0.50); }
    .t-quartz .tk-arrow::after   { border-top: 1px solid rgba(142,196,216,0.50); border-right: 1px solid rgba(142,196,216,0.50); }
    .t-quartz:hover .tk-arrow    { width: 38px; background: var(--quartz); }
    .t-quartz:hover .tk-arrow::after { border-color: var(--quartz); }

    @media (max-width: 360px) {
      .tk-arrow, .t-gold:hover .tk-arrow,
      .t-lav:hover .tk-arrow, .t-quartz:hover .tk-arrow { display: none; }
    }

    /* ════════════════════════════════════════
       Footer
    ════════════════════════════════════════ */
    .footer-note {
      margin-top: 4.5rem;
      text-align: center;
      opacity: 0;
      animation: silkFadeIn 1.6s var(--ease-silk) 1.6s forwards;
    }

    .footer-divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.6rem;
      position: relative;
    }
    .footer-divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 6px; height: 6px;
      border: 1px solid var(--gold);
    }

    .footer-text {
      font-family: "Cormorant Garamond", "Noto Serif TC", serif;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      color: var(--text-secondary);
      line-height: 2.2;
      font-weight: 400;
      font-style: italic;
    }

    .footer-signature {
      margin-top: 1.2rem;
      font-size: 0.62rem;
      letter-spacing: var(--tracking-loose);
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ════════════════════════════════════════
       Animations
    ════════════════════════════════════════ */
    @keyframes silkFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes silkRise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-out { animation: fadeOut 0.6s var(--ease-silk) forwards; }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: scale(0.98); }
    }

    /* ════════════════════════════════════════
       Responsive
    ════════════════════════════════════════ */
    @media (max-width: 480px) {
      .content { padding: 4.5rem 1.5rem 3rem; }
      .brand-mark { margin-bottom: 3rem; }
      .hero { margin-bottom: 3.8rem; }
      .hero-title { font-size: 2rem; letter-spacing: 0.14em; }
      .tickets { gap: 1.3rem; }
      .ticket-content { padding: 0 1.4rem 0 2.2rem; gap: 1rem; }
      .tk-label { font-size: 1.05rem; }
      .tk-desc { font-size: 0.70rem; }
      .footer-note { margin-top: 3.5rem; }
    }

    /* Accessibility — Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.1s !important;
      }
    }
  </style>
</head>
<body>

  <div class="content">

    <!-- 品牌 mark -->
    <div class="brand-mark">
      <span class="brand-line"></span>
      <span class="brand-glyph">Est · 宇宙訊號</span>

    <!-- Hero -->

    <!-- 三入口 — 不規則票卷 -->
    <div class="tickets">

      <!-- ① 今日祝福：橫式票，左右兩側半圓缺口 -->
      <a class="ticket-entry t-gold" href="daily-color.html" aria-label="今日祝福">

          <!-- 票形：左右半圓缺口 -->
          <path d="

            <linearGradient id="qbar" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#A8D4E4" stop-opacity="0.9"/>
              <stop offset="50%"  stop-color="#8EC4D8" stop-opacity="1"/>
              <stop offset="100%" stop-color="#6AAEC4" stop-opacity="0.8"/>
            </linearGradient>
          </defs>
          <!-- 虛線 -->
          <line x1="16" y1="59" x2="350" y2="59"

          <!-- 右側小圓裝飾 -->
          <circle cx="330" cy="26" r="5" fill="none"

          <!-- 頂部光暈 -->
          <path d="M 14 5 L 340 5 Q 353 5 353 18 L 353 14 Q 353 5 340 5 L 20 5 Q 7 5 7 18 L 7 14 Q 7 5 20 5 Z"
            fill="rgba(232,201,122,0.08)"/>
        </svg>
        <div class="ticket-content">
          <div class="ticket-text">
            <div class="tk-eyebrow">Daily Blessing</div>
            <div class="tk-label">今日祝福</div>
            <div class="tk-desc">今日的色彩訊息，給你一個靜觀的起點</div>
          </div>
          <div class="tk-arrow"></div>
        </div>
      </a>

      <!-- ② 脈輪貓：頂部圓弧缺口（V 領式） -->
      <a class="ticket-entry t-lav" href="chakra-cat.html" aria-label="覺察能量">
        <svg class="ticket-svg" viewBox="0 0 360 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="
            M 24 5
            L 144 5 Q 162 5 180 24 Q 198 5 216 5
            L 336 5 Q 353 5 353 22
            L 353 108 Q 353 123 336 123
            L 24 123 Q 7 123 7 108

            fill="rgba(28, 22, 44, 0.93)"
            stroke="rgba(196,170,223,0.32)"
            stroke-width="1.2"/>
          <!-- 薰衣草左邊條 -->
          <rect x="7" y="5" width="5" height="118" rx="1.5" fill="url(#lbar)"/>
          <!-- 虛線 -->
          <line x1="16" y1="66" x2="350" y2="66"
            stroke="rgba(196,170,223,0.18)" stroke-width="1" stroke-dasharray="5,5"/>
          <!-- 星點裝飾 -->
          <text x="330" y="34" font-size="11" fill="rgba(196,170,223,0.32)" text-anchor="middle" font-family="serif">✦</text>

        <div class="ticket-content">
          <div class="ticket-text">
            <div class="tk-eyebrow">Energy Awareness</div>
            <div class="tk-label">覺察能量</div>
            <div class="tk-desc">感受七個能量中心，聆聽身體此刻的聲音</div>
          </div>
          <div class="tk-arrow"></div>
        </div>
      </a>

      <!-- ③ 靜觀空間：波浪底邊 -->
      <a class="ticket-entry t-quartz" href="cat-room.html" aria-label="靜觀空間">
        <svg class="ticket-svg" viewBox="0 0 360 118" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="
            M 24 5
            L 336 5 Q 353 5 353 22
            L 353 94
